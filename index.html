<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap E-Purchasing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <div class="container py-4">
        <h2 class="text-center mb-4 fw-bold text-primary">REKAP E-PURCHASING</h2>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-header bg-primary text-white fw-bold">Tambah Data Baru</div>
            <form id="formRekap" class="card-body row g-3">
                <div class="col-md-2"><label class="form-label small">Tanggal</label><input type="date" id="inTgl"
                        class="form-control" required></div>
                <div class="col-md-3"><label class="form-label small">Dinas</label><input type="text" id="inDinas"
                        class="form-control" placeholder="Nama Dinas" required></div>
                <div class="col-md-3"><label class="form-label small">PPK</label><input type="text" id="inPPK"
                        class="form-control" placeholder="Nama PPK" required></div>
                <div class="col-md-2"><label class="form-label small">Kode RUP</label><input type="text" id="inRUP"
                        class="form-control" required></div>
                <div class="col-md-2">
                    <label class="form-label small">Status</label>
                    <select id="inStatus" class="form-select" required>
                        <option value="Proses" selected>Proses</option>
                        <option value="Selesai">Selesai</option>
                        <option value="Batal">Batal</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label small">Nama Pekerjaan</label><input type="text"
                        id="inKerja" class="form-control" required></div>
                <div class="col-md-3"><label class="form-label small">Pagu (Nominal)</label><input type="number"
                        id="inPagu" class="form-control" required></div>
                <div class="col-md-5">
                    <label class="form-label small fw-bold">Upload Dokumen DPP (PDF)</label>
                    <input type="file" id="inFile" class="form-control" accept="application/pdf" required>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" id="btnSimpan" class="btn btn-success px-5 fw-bold">Simpan Data Rekap</button>
                </div>
            </form>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Cari Dinas</label>
                        <input type="text" id="fDinas" class="form-control" placeholder="🔍 Ketik nama dinas...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Cari PPK</label>
                        <input type="text" id="fPPK" class="form-control" placeholder="🔍 Nama PPK...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Bulan</label>
                        <select id="fBulan" class="form-select">
                            <option value="">Semua Bulan</option>
                            <option value="-01-">Januari</option>
                            <option value="-02-">Februari</option>
                            <option value="-03-">Maret</option>
                            <option value="-04-">April</option>
                            <option value="-05-">Mei</option>
                            <option value="-06-">Juni</option>
                            <option value="-07-">Juli</option>
                            <option value="-08-">Agustus</option>
                            <option value="-09-">September</option>
                            <option value="-10-">Oktober</option>
                            <option value="-11-">November</option>
                            <option value="-12-">Desember</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Tahun</label>
                        <select id="fTahun" class="form-select">
                            <option value="">Semua Tahun</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>Tanggal</th>
                        <th>Dinas</th>
                        <th>PPK</th>
                        <th>RUP</th>
                        <th>Pekerjaan</th>
                        <th>Pagu</th>
                        <th>Status</th>
                        <th>DPP</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" class="text-center">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="paginationContainer" class="d-flex justify-content-between align-items-center mt-3 px-2 d-none">
            <button id="btnPrev" class="btn btn-outline-primary btn-sm fw-bold" onclick="changePage(-1)">
                ← Sebelumnya
            </button>
            <span id="pageInfo" class="small fw-bold text-muted"></span>
            <button id="btnNext" class="btn btn-outline-primary btn-sm fw-bold" onclick="changePage(1)">
                Selanjutnya →
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
